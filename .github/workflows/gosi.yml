name: 부산 고시공고 수집 → DB 자동 갱신

on:
  schedule:
    # 한국시간 기준 오전 9시, 오후 3시, 오후 9시 (UTC 0, 6, 12시)
    - cron: '0 0,6,12 * * *'
  workflow_dispatch:  # 수동 실행

jobs:
  collect-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Python 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Chrome 설치
      uses: browser-actions/setup-chrome@latest
      with:
        chrome-version: stable

    - name: 패키지 설치
      run: |
        pip install --upgrade pip
        pip install selenium webdriver-manager requests supabase PyMuPDF opencv-python-headless shapely numpy

    - name: 고시문 수집 → 단계 갱신 → 폴리곤 추출
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: |
        python gosi_to_stage.py --pages 3

    - name: 상태 파일 커밋 (중복 방지)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add gosi_stage_state.json || true
        git diff --staged --quiet || git commit -m "chore: update gosi state [skip ci]"
        git push
